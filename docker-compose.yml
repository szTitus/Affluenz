services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-affluence}
      POSTGRES_USER: ${POSTGRES_USER:-affluence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-affluence_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-affluence} -d ${POSTGRES_DB:-affluence}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-affluence}:${POSTGRES_PASSWORD:-affluence_secret}@db:5432/${POSTGRES_DB:-affluence}
      OPENAGENDA_KEY: ${OPENAGENDA_KEY:-}
      DATATOURISME_KEY: ${DATATOURISME_KEY:-}
      OPENWEATHERMAP_KEY: ${OPENWEATHERMAP_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      API_URL: http://api:8000
    depends_on:
      - api

volumes:
  postgres_data:
